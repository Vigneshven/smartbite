server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/smartbite_dev

spring.datasource.username=smartbite_dev_user

spring.datasource.password=dev_password123

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update

# Email provider configuration for OTP sending
email.enabled=true
email.from=${EMAIL_FROM:dev@smartbite.local}
sendgrid.api.key=${SENDGRID_API_KEY:}
sendgrid.api.url=https://api.sendgrid.com/v3/mail/send
email.dev.stub=true
# In development, email.dev.stub=true by default so OTPs are logged instead of sent.
# Set SENDGRID_API_KEY and EMAIL_FROM in your local environment for real SendGrid delivery.
# If you need to test with real email sending, set email.dev.stub=false and provide the provider configuration.
# Logging Configuration
logging.level.root=INFO
logging.level.com.example.demo=DEBUG
logging.level.com.example.demo.service.OtpService=DEBUG
logging.level.com.example.demo.service.EmailService=DEBUG
logging.level.com.example.demo.controller.AuthController=DEBUG

# Local development JWT secret for startup; override with JWT_SECRET if needed.
jwt.secret=${JWT_SECRET:dev-jwt-secret-32-chars-long-123456}