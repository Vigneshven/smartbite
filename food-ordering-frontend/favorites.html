<!doctype html>
<html>
  <head>
    <title>Favorites</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <div class="navbar">
      <div class="nav-left">
        <h2>🍔 SmartBite</h2>
      </div>

      <div class="nav-center">
        <input
          type="text"
          id="favoriteSearch"
          placeholder="🔍 Search favorites..."
        />
      </div>

      <div class="nav-right">
        <div class="profile-menu">
          <button class="profile-btn" onclick="toggleProfileMenu()">
            👤 <span id="username">User</span> ▼
          </button>

          <div id="profileDropdown" class="profile-dropdown">
            <div class="profile-header">
              <h3 id="profileName"></h3>

              <p id="profileEmail"></p>

              <p id="profilePhone"></p>
            </div>

            <button onclick="window.location.href = 'dashboard.html'">
              🏠 Dashboard
            </button>

            <button onclick="window.location.href = 'orders.html'">
              📦 My Orders
            </button>

            <button onclick="window.location.href = 'favorites.html'">
              ❤️ Wishlist
            </button>

            <button onclick="logout()">🚪 Logout</button>
          </div>
        </div>

        <button onclick="window.location.href = 'restaurants.html'">
          🏠 Restaurants
        </button>

        <button onclick="window.location.href = 'foods.html'">🍽 Menu</button>

        <button onclick="window.location.href = 'cart.html'">
          🛒 Cart

          <span id="cartCount" class="nav-badge">0</span>
        </button>

        <button onclick="toggleDarkMode()">🌙</button>
      </div>
    </div>

    <h2 class="section-title">❤️ My Wishlist</h2>

    <p class="food-count">Save your favorite foods and order them anytime.</p>

    <div id="favorites"></div>

    <script src="js/favorites.js"></script>
    <script src="js/common.js"></script>

    <footer class="footer">
      <div class="footer-content">
        <h3>🍔 SmartBite</h3>
      </div>
    </footer>
    <div id="toast" class="toast"></div>
  </body>
</html>
