<!doctype html>
<html>
  <head>
    <title>Restaurants</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <div class="navbar">
      <div class="nav-left">
        <h2>🍔 SmartBite</h2>
      </div>

      <div class="nav-center">
        <input
          type="text"
          id="searchInput"
          placeholder="🔍 Search by restaurant name..."
        />
      </div>

      <div class="nav-right">
        <div class="profile-menu">
          <button class="profile-btn" onclick="toggleProfileMenu()">
            👤 <span id="username">User</span> ▼
          </button>

          <div id="profileDropdown" class="profile-dropdown">
            <div class="profile-header">
              <h3 id="profileName"></h3>

              <p id="profileEmail"></p>

              <p id="profilePhone"></p>
            </div>

            <button onclick="window.location.href = 'dashboard.html'">
              🏠 Dashboard
            </button>

            <button onclick="window.location.href = 'orders.html'">
              📦 My Orders
            </button>

            <button onclick="window.location.href = 'favorites.html'">
              ❤️ Wishlist
            </button>

            <button onclick="logout()">🚪 Logout</button>
          </div>
        </div>
        <button onclick="window.location.href = 'cart.html'">
          🛒 Cart

          <span id="cartCount" class="nav-badge">0</span>
        </button>

        <button onclick="window.location.href = 'favorites.html'">
          ❤️ Wishlist

          <span id="wishlistCount" class="nav-badge">0</span>
        </button>
        <button onclick="toggleDarkMode()">🌙</button>
      </div>
    </div>

    <!-- HERO -->
    <div class="hero-banner">
      <h1>🍽 Discover Your Next Meal</h1>
      <p>Explore top restaurants and order your favorite dishes instantly.</p>
    </div>

    <h2 class="section-title">🍽 Explore Restaurants</h2>

    <p id="restaurantCount" class="page-count">Showing 0 Restaurants</p>

    <div id="restaurants"></div>

    <script src="js/restaurants.js"></script>
    <script src="js/common.js"></script>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="footer-content">
        <h3>🍔 SmartBite</h3>
        <p>Eat Smart, Live Better</p>

        <div class="footer-links">
          <a href="restaurants.html">Restaurants</a>
          <a href="foods.html">Menu</a>
          <a href="cart.html">Cart</a>
          <a href="favorites.html">Wishlist</a>
        </div>

        <p class="copyright">© 2026 SmartBite. All rights reserved.</p>
      </div>
    </footer>
    <div id="toast" class="toast"></div>
  </body>
</html>
