<!doctype html>
<html>
  <head>
    <title>SmartBite Dashboard</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="navbar"></div>

    <!-- Main scrollable content area (leaves room for bottom nav) -->
    <main class="dashboard-main">
      <!-- Greeting Section -->
      <section class="greeting-section">
        <h1 id="greetingMessage">Hello, Guest 👋</h1>
        <p id="timeGreeting">
          Unlock personalized recommendations and order tracking
        </p>
      </section>

      <!-- 🔥 TRENDING RESTAURANTS -->
      <section class="dashboard-section">
        <div class="section-header">
          <h2 class="section-title">Trending Restaurants</h2>
          <a href="restaurants.html" class="view-all">View All</a>
        </div>
        <div id="trendingRestaurants" class="restaurants-scroll"></div>
      </section>

      <!-- 🍔 POPULAR FOODS -->
      <section class="dashboard-section">
        <div class="section-header">
          <h2 class="section-title">Popular Foods</h2>
          <a href="foods.html" class="view-all">View All</a>
        </div>
        <div id="popularFoods" class="foods-grid"></div>
      </section>

      <!-- 🎉 TODAY'S OFFERS -->
      <section class="dashboard-section">
        <div id="todaysOffers" class="offers-banner"></div>
      </section>

      <!-- 🏷️ CATEGORIES -->
      <section class="dashboard-section">
        <div class="section-header">
          <h2 class="section-title">Categories</h2>
        </div>
        <div id="categories" class="categories-grid"></div>
      </section>

      <!-- Additional sections (hidden on mobile, visible on tablet+) -->
      <section class="dashboard-section hidden-mobile">
        <h2 class="section-title">⭐ Recommended Based On Orders</h2>
        <div id="recommendations" class="dashboard-grid"></div>
      </section>

      <section class="dashboard-section hidden-mobile">
        <h2 class="section-title">❤️ Based On Your Wishlist</h2>
        <div id="wishlistRecommendations" class="dashboard-grid"></div>
      </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item" title="Home">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Home</span>
      </a>
      <a href="dashboard.html" class="nav-item" title="Dashboard">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a href="restaurants.html" class="nav-item" title="Restaurants">
        <span class="nav-icon">🍽️</span>
        <span class="nav-label">Restaurants</span>
      </a>
      <a href="cart.html" class="nav-item" title="Cart">
        <span class="nav-icon">🛒</span>
        <span class="nav-label">Cart</span>
        <span class="nav-badge" id="cartBadge" style="display: none">0</span>
      </a>
      <a
        href="profile.html"
        class="nav-item"
        id="profileNavBtn"
        title="Profile"
      >
        <span class="nav-icon">👤</span>
        <span class="nav-label">Profile</span>
      </a>
    </nav>

    <script src="js/common.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/navbar.js"></script>
    <div id="toast" class="toast"></div>
  </body>
</html>
